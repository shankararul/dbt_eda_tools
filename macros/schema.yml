version: 2
macros:
  - name: describe
    description: The macro describes the structure of the dataset along with the column types. A loose and close implementation of pandas.describe().
    arguments:
      - name: model_name
        type: string
        description: The DBT model which needs to be described.
      - name: include
        type: list or string
        description: Optional filter for column data types. Can be an array ['text','boolean','numeric','date'] or string 'all'. If None, analyzes all column types.
      - name: column_filter
        type: list
        description: "Optional list of specific column names to analyze. When provided, only these columns will be described. Example: ['column1', 'column2']. Works alongside include parameter."

  - name: get_missing_date
    description: The macro calculates all the missing dates in the model for the specificied dimensions and input filter conditions.
    arguments:
      - name: model_name
        type: string
        description: The DBT model which needs to be inspected for missing dates.
      - name: date_col
        type: string
        description: The date column that needs to be inspected.
      - name: dimensions
        type: string
        description: An array of dimensions as strings.
      - name: filters
        type: string
        description: A dictionary with the columns that need to be filtered if needed.
      - name: expected_frequency
        type: string
        description: Expected time frequency of dates. Ex MONTH, YEAR, DAY etc.

  - name: percent_of_total
    description: The macro calculates the percentage of total for the provided aggregation and column
    arguments:
      - name: column_to_aggregate
        type: string
        description: The column on which the percentages need to be computed
      - name: aggregation
        type: string
        description: Can take a value of SUM, COUNT or COUNTDISTINCT. Defaults to count
      - name: precision
        type: integer
        description: Number of decimal places to round the result. Defaults to 2.
      - name: level
        type: string
        description: An array of columns to aggregate at the specified level.

  - name: get_preview
    description: Returns the first few rows of a table
    arguments:
      - name: num_rows
        type: integer
        description: The number of rows to return. Defaults to 5.

  - name: get_row_count
    description: Returns the number of rows in a table

  - name: estimate_build_cost
    description: >
      Reports the actual GB scanned and estimated cost (USD) for the current dbt invocation.
      Designed to run as an on-run-end hook in dbt_project.yml. After each dbt run/build/test,
      it queries INFORMATION_SCHEMA.JOBS_BY_USER to find all BigQuery jobs tagged with the
      current dbt invocation ID and aggregates their total bytes billed.
      BigQuery only. Requires the service account to have bigquery.jobs.list permission
      (granted via roles/bigquery.resourceViewer or roles/bigquery.user at project level).


      Or run manually:
        dbt run-operation estimate_build_cost
